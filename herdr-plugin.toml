id = "dotfiles.usage-limits"
name = "Usage Limits"
version = "1.2.0"
min_herdr_version = "0.7.4"
description = "CC/Codex rate-limit window title display"
platforms = ["macos"]

# ウィンドウタイトル書き込み用 paneless デーモンの自動起動
# 既存セッションには workspace.created が飛ばないため、初回は
# `herdr plugin action invoke start-title-daemon --plugin dotfiles.usage-limits` で手動起動する
[[events]]
on = "workspace.created"
command = ["./scripts/ensure-title-daemon.sh"]

[[actions]]
id = "start-title-daemon"
title = "Start usage-limits title daemon"
command = ["./scripts/ensure-title-daemon.sh"]

[[actions]]
id = "stop-title-daemon"
title = "Stop usage-limits title daemon"
command = ["./scripts/ensure-title-daemon.sh", "stop"]
